<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alertas Obra">
<title>Alertas Obra RVC</title>
<meta name="theme-color" content="#CC2929">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#CC2929; --red-d:#A82020; --red-l:#FDEAEA;
  --cream:#F5F3EE; --surface:#EEEAE3; --surface2:#E6E1D9;
  --border:#D9D4CB; --text:#1A1916; --text2:#5A5750; --text3:#9A948C;
  --white:#FFFFFF; --blue:#185FA5; --blue-l:#E6F1FB;
  --crit-baja-bg:#EAF3DE;   --crit-baja-fg:#3B6D11;   --crit-baja-bd:#C0DD97;
  --crit-media-bg:#FEF3DC;  --crit-media-fg:#854F0B;  --crit-media-bd:#FAC775;
  --crit-alta-bg:#FAECE7;   --crit-alta-fg:#993C1D;   --crit-alta-bd:#F0997B;
  --crit-critica-bg:#FCEBEB;--crit-critica-fg:#A32D2D;--crit-critica-bd:#F7C1C1;
  --est-activa-bg:#FCEBEB;    --est-activa-fg:#A32D2D;
  --est-gestion-bg:#E6F1FB;   --est-gestion-fg:#185FA5;
  --est-resuelta-bg:#EAF3DE;  --est-resuelta-fg:#3B6D11;
  --est-descartada-bg:#EEECEA;--est-descartada-fg:#6B6963;

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);font-size:14px;}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--cream);padding:24px;}
.login-title{font-size:22px;font-weight:600;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;line-height:1.5;}
.login-btn{display:flex;align-items:center;gap:10px;padding:12px 24px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
.login-btn:hover{background:var(--red-d);}
.login-err{margin-top:14px;font-size:12px;color:var(--red);text-align:center;}
.acceso-denegado{background:var(--red-l);border:1px solid var(--crit-critica-bd);border-radius:6px;padding:10px 14px;}

/* LOADING */
.loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text3);}

/* APP */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* HEADER */
.hdr{background:var(--red);color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;z-index:20;}
.hdr-left{display:flex;flex-direction:column;justify-content:center;}
.hdr-left h1{font-size:15px;font-weight:600;line-height:1.2;}
.hdr-left p{font-size:10px;opacity:.65;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hbtn{background:rgba(255,255,255,.15);border:1px solid transparent;color:#fff;border-radius:6px;padding:0 12px;height:32px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background .15s;}
.hbtn:hover{background:rgba(255,255,255,.25);}
.hbtn.primary{background:#fff;color:var(--red);font-weight:600;display:flex;align-items:center;gap:4px;}
.hbtn.primary:hover{background:#f5f5f5;}
.hbtn.tab-active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);}
/* ── DASHBOARD ── */
.db-view{display:none;flex:1;overflow-y:auto;flex-direction:column;background:var(--cream);}
.db-view.open{display:flex;}
.db-filter-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
.db-filter-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-right:2px;}
.db-fsel{border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);background:var(--cream);font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;}
.db-fsel:focus{border-color:var(--red);}
.db-fsel.active{border-color:var(--red);color:var(--red);background:var(--red-l);}
.db-fsep{width:1px;height:18px;background:var(--border);margin:0 2px;}
.db-clear{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:3px 6px;border-radius:4px;}
.db-clear:hover{color:var(--red);}
.db-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.db-row{display:grid;gap:10px;}
.db-r4{grid-template-columns:repeat(4,minmax(0,1fr));}
.db-r3{grid-template-columns:1.3fr 1fr 1fr;}
.db-r2{grid-template-columns:1fr 1fr;}
.db-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.db-kpi-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.db-kpi-num{font-size:26px;font-weight:600;line-height:1;color:var(--text);}
.db-kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.db-card-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.db-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;cursor:pointer;border-radius:4px;padding:2px 4px;transition:background .1s;}
.db-bar-row:hover{background:var(--surface);}
.db-bar-lbl{font-size:11px;color:var(--text2);width:118px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.db-bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:7px;overflow:hidden;}
.db-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.db-bar-num{font-size:11px;color:var(--text3);width:16px;text-align:right;flex-shrink:0;}
.db-st-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.db-st-row:last-child{border-bottom:none;}
.db-st-name{font-size:12px;color:var(--text);display:flex;align-items:center;gap:6px;}
.db-st-bar{width:65px;background:var(--surface2);border-radius:3px;height:5px;overflow:hidden;margin:0 8px;}
.db-st-fill{height:100%;border-radius:3px;}
.db-st-num{font-size:11px;color:var(--text3);width:16px;text-align:right;}
.db-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.db-leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.db-leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
.db-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:var(--surface);color:var(--text2);margin:0 3px 3px 0;}
.db-chip strong{color:var(--text);}
.db-alerta-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.db-alerta-row:last-child{border-bottom:none;}
.db-alerta-bar{width:3px;min-height:30px;border-radius:2px;flex-shrink:0;margin-top:3px;}
.db-alerta-desc{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px;}
.db-alerta-meta{font-size:11px;color:var(--text3);}
.hdr-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;color:#fff;}
.sync-bar{display:flex;align-items:center;gap:5px;font-size:11px;opacity:.85;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:rgba(150,255,180,.85);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:0;display:flex;flex-direction:column;}
/* Tarjetas resumen */
.sb-summary{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px 8px;border-bottom:1px solid var(--border);}
.sb-summary-title{grid-column:1/-1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);padding-bottom:2px;}
.sum-card{background:var(--white);border-radius:7px;padding:8px 10px;border:1px solid var(--border);cursor:pointer;transition:all .15s;text-align:center;}
.sum-card:hover{border-color:var(--text3);transform:translateY(-1px);}
.sum-card.active-card{border-color:currentColor;}
.sum-card-num{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px;}
.sum-card-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;opacity:.75;}
.sum-critica .sum-card-num{color:var(--crit-critica-fg);}
.sum-critica{border-color:var(--crit-critica-bd)!important;}
.sum-alta .sum-card-num{color:var(--crit-alta-fg);}
.sum-alta{border-color:var(--crit-alta-bd)!important;}
.sum-media .sum-card-num{color:var(--crit-media-fg);}
.sum-media{border-color:var(--crit-media-bd)!important;}
.sum-baja .sum-card-num{color:var(--crit-baja-fg);}
.sum-baja{border-color:var(--crit-baja-bd)!important;}
/* sb-section reemplazado por fblock-btn */
.fblock{border-bottom:1px solid var(--border);}
.fblock-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;cursor:pointer;user-select:none;
  font-size:12px;font-weight:500;color:var(--text2);
  background:none;border:none;width:100%;text-align:left;
  font-family:'DM Sans',sans-serif;transition:background .1s;
}
.fblock-btn:hover{background:var(--surface2);color:var(--text);}
.fblock-btn.has-filter{color:var(--red);font-weight:600;}
.fblock-arrow{font-size:10px;transition:transform .2s;color:var(--text3);}
.fblock-arrow.open{transform:rotate(180deg);}
.fblock-cnt{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-right:4px;}
.fblock-btn.has-filter .fblock-cnt{color:var(--red);}
.fblock-body{padding:0 8px 6px;display:none;}
.fblock-body.open{display:block;}
.fopt{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--text2);transition:background .1s;}
.fopt:hover{background:var(--surface2);color:var(--text);}
.fopt.active{background:var(--red-l);color:var(--red);font-weight:500;}
.fcnt{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);}
.fopt.active .fcnt{color:var(--red);}
.clear-filters-btn{margin:6px 10px;padding:6px;background:none;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;width:calc(100% - 20px);}
.clear-filters-btn:hover{background:var(--red-l);color:var(--red);border-color:var(--red);}
.date-filter-body{padding:8px 12px 10px;display:none;}
.date-filter-body.open{display:block;}
.date-row{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.date-row label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.date-input{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:var(--cream);outline:none;width:100%;cursor:pointer;}
.date-input:focus{border-color:var(--red);}
.date-clear{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;text-align:left;}
.date-clear:hover{color:var(--red);}

/* CONTENT */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--cream);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-shrink:0;}
.search-icon{font-size:14px;color:var(--text3);}
.search{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.search::placeholder{color:var(--text3);}

/* TABLA */
/* ── TABLA ── */
.alert-table{width:100%;border-collapse:collapse;table-layout:auto;}
.alert-table thead{position:sticky;top:41px;z-index:9;}
.alert-table thead tr{background:#EAE6DF;}
.alert-table th{
  padding:6px 8px;
  font-size:10px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-bottom:1px solid var(--border);
  text-align:left;
}
.alert-table th:hover{color:var(--text);}
.alert-table td{
  padding:0 8px;
  border-bottom:1px solid var(--border);
  height:38px;
  vertical-align:middle;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.alert-table tbody tr{cursor:pointer;transition:background .1s;}
.alert-table tbody tr:hover{background:var(--surface);}
.alert-table tbody tr.sel{background:var(--red-l);}
.td-desc{font-size:13px;font-weight:500;color:var(--text);}
.td-txt {font-size:12px;color:var(--text2);}
.td-mono{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;}
.td-cat {font-size:11px;color:var(--text2);}

/* BADGES */
.badge{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;border:1px solid transparent;}
.badge-baja    {background:var(--crit-baja-bg);   color:var(--crit-baja-fg);  border-color:var(--crit-baja-bd);}
.badge-media   {background:var(--crit-media-bg);  color:var(--crit-media-fg); border-color:var(--crit-media-bd);}
.badge-alta    {background:var(--crit-alta-bg);   color:var(--crit-alta-fg);  border-color:var(--crit-alta-bd);}
.badge-critica {background:var(--crit-critica-bg);color:var(--crit-critica-fg);border-color:var(--crit-critica-bd);}
.badge-activa    {background:var(--est-activa-bg);   color:var(--est-activa-fg);}
.badge-gestion   {background:var(--est-gestion-bg);  color:var(--est-gestion-fg);}
.badge-resuelta  {background:var(--est-resuelta-bg); color:var(--est-resuelta-fg);}
.badge-descartada{background:var(--est-descartada-bg);color:var(--est-descartada-fg);}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state p{margin-top:8px;font-size:13px;}

/* FAB */
.fab{display:none;position:fixed;bottom:24px;right:20px;width:52px;height:52px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(204,41,41,.4);z-index:50;align-items:center;justify-content:center;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-inner{padding:20px;display:flex;flex-direction:column;gap:14px;}
.modal-title{font-size:16px;font-weight:600;color:var(--text);padding-bottom:4px;border-bottom:1px solid var(--border);}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.fi,.fsel,.fta{border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--cream);outline:none;transition:border-color .15s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--red);}
.fta{resize:vertical;min-height:64px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;padding-top:4px;}
.mbtn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid transparent;}
.mbtn-cancel{background:var(--surface);color:var(--text2);border-color:var(--border);}
.mbtn-cancel:hover{background:var(--surface2);}
.mbtn-save{background:var(--red);color:#fff;}
.mbtn-save:hover{background:var(--red-d);}

/* ADJUNTOS en formulario */
.adjunto-area{border:1.5px dashed var(--border);border-radius:7px;background:var(--surface);overflow:hidden;}
.adjunto-btns{display:flex;gap:0;border-bottom:1px solid var(--border);}
.adj-btn{flex:1;padding:9px 6px;background:none;border:none;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .1s;}
.adj-btn:hover{background:var(--surface2);}
.adj-btn+.adj-btn{border-left:1px solid var(--border);}
.adjunto-preview{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.adj-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--cream);border-radius:5px;border:1px solid var(--border);}
.adj-item-icon{font-size:16px;flex-shrink:0;}
.adj-item-name{flex:1;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.adj-item-size{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0;}
.adj-item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.adj-item-del:hover{color:var(--red);}
.adj-hint{padding:12px;text-align:center;font-size:12px;color:var(--text3);}
.adj-progress{height:3px;background:var(--red-l);border-radius:2px;overflow:hidden;margin-top:2px;}
.adj-progress-bar{height:100%;background:var(--red);width:0%;transition:width .2s;}

/* DETAIL PANEL */
.detail-panel{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--white);overflow-y:auto;display:none;flex-direction:column;}
.detail-panel.open{display:flex;}
.dp-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.dp-hdr-title{font-size:13px;font-weight:600;}
.dp-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:0 4px;}
.dp-body{padding:16px;display:flex;flex-direction:column;gap:14px;flex:1;}
.dp-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:block;margin-bottom:3px;}
.dp-field p{font-size:13px;color:var(--text);line-height:1.5;}
.dp-desc{font-size:13px;color:var(--text);line-height:1.6;background:var(--cream);border-radius:6px;padding:10px;}
.dp-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.dp-actions label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.estado-btns{display:flex;flex-wrap:wrap;gap:6px;}
.estado-btn{padding:5px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--cream);color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s;}
.estado-btn:hover{border-color:var(--text2);}
.estado-btn.active-btn{background:var(--red);color:#fff;border-color:var(--red);}
.dp-edit-btn{width:100%;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.dp-edit-btn:hover{background:var(--surface2);}
.dp-del-btn{width:100%;padding:8px;background:none;border:1px solid var(--crit-critica-bd);border-radius:7px;font-size:12px;font-weight:500;color:var(--crit-critica-fg);cursor:pointer;font-family:'DM Sans',sans-serif;}
.dp-del-btn:hover{background:var(--red-l);}

/* ADJUNTOS en detalle */
.dp-adj-list{display:flex;flex-direction:column;gap:6px;}
.dp-adj-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--cream);border-radius:6px;border:1px solid var(--border);cursor:pointer;text-decoration:none;}
.dp-adj-item:hover{background:var(--surface2);}
.dp-adj-icon{font-size:18px;flex-shrink:0;}

const APP_ID    = 'piloto2_alertas';
const COLECCION = 'piloto2_alertas';

// ── ESTADO ──────────────────────────────────────────────────────────
let currentUser = null;
let alerts = [];
let unsubscribe = null;
let editId = null;
let selectedId = null;
let filters = { estado:'', criticidad:'', tipo:'', situacion:'', obra:'', usuario:'' };
let fechaDesde = null; // Date object
let fechaHasta = null; // Date object
let sortCol  = 'creadoEn';
let sortDir  = 'desc'; // 'asc' | 'desc'
// Adjuntos pendientes en el formulario (antes de guardar)
let pendingFiles = []; // [{file, name, tipo, previewUrl}]
// Adjuntos ya subidos (al editar)
let existingAdjuntos = []; // [{name, url, tipo}]

// ── FECHAS ──────────────────────────────────────────────────────────
const DIAS  = ['dom','lun','mar','mié','jue','vie','sáb'];
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function setHeaderDate(){
  const d = new Date();
  document.getElementById('hdr-date').textContent =
    `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtFecha(ts){
  if(!ts) return '—';
  const d = ts.toDate?ts.toDate():new Date(ts);
  return `${d.getDate()} ${MESES[d.getMonth()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtFechaLarga(ts){
  if(!ts) return '—';
  const d = ts.toDate?ts.toDate():new Date(ts);
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(0)+'KB';
  return (bytes/(1024*1024)).toFixed(1)+'MB';
}

// ── SYNC / TOAST ────────────────────────────────────────────────────
function setSyncStatus(type,text){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(txt) txt.textContent=text;
  if(dot) dot.style.background=type==='ok'?'rgba(150,255,180,.85)':type==='error'?'#ff8080':'#ffcc44';
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ── AUTH ─────────────────────────────────────────────────────────────
window.signIn = async function(){
  document.getElementById('login-err').textContent='';
  try{ await signInWithPopup(auth,provider); }
  catch(e){
    const err=document.getElementById('login-err');
    if(e.code==='auth/popup-blocked') err.textContent='Activa popups e intenta de nuevo.';
    else if(e.code==='auth/popup-closed-by-user') err.textContent='Cancelaste el inicio de sesión.';
    else err.textContent='Error: '+(e.message||'desconocido');
  }
};
window.signOut = async function(){
  if(IS_PREVIEW){ showToast('👁 Modo preview — sin sesión real'); return; }
  if(!confirm('¿Cerrar sesión?')) return;
  if(unsubscribe) unsubscribe();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, async user=>{
  if(user){
    const email=(user.email||'').toLowerCase();
    try{
      const userDoc=await getDoc(doc(db,'plataforma_usuarios',email));
      const datos=userDoc.exists()?userDoc.data():null;
      const tieneAcceso=datos&&datos.activo!==false&&(datos.apps||[]).includes(APP_ID);
      if(!tieneAcceso){
        let msg;
        if(!datos) msg=`Tu cuenta <strong>${email}</strong> no está registrada.`;
        else if(datos.activo===false) msg=`Tu cuenta está desactivada.`;
        else msg=`No tienes acceso a esta app (${APP_ID}).`;
        await fbSignOut(auth);
        document.getElementById('login-err').innerHTML=`<div class="acceso-denegado">⛔ ${msg}</div>`;
        return;
      }
      currentUser=user; initApp();
    }catch(e){
      console.error(e); await fbSignOut(auth);
      document.getElementById('login-err').textContent='Error al verificar acceso. Intenta de nuevo.';
    }
  } else {
    currentUser=null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
    document.getElementById('loading-screen').style.display='none';
    if(unsubscribe){unsubscribe();unsubscribe=null;}
  }
});

function initApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  setHeaderDate();
  const av=document.getElementById('hdr-avatar');
  av.textContent=(currentUser.displayName||currentUser.email||'?')[0].toUpperCase();
  av.title=`${currentUser.displayName||currentUser.email} — click para salir`;
  setSyncStatus('syncing','Conectando...');
  // Activar pestaña alertas por defecto
  document.getElementById('tab-alertas')?.classList.add('tab-active');
  startListener();
}

// ── LISTENER ─────────────────────────────────────────────────────────
function startListener(){
  const q=query(collection(db,COLECCION),orderBy('creadoEn','desc'));
  unsubscribe=onSnapshot(q,
    snap=>{
      alerts=snap.docs.map(d=>({id:d.id,...d.data()}));
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      setSyncStatus('ok','En vivo');
      render();
      if(currentTab==='dashboard') renderDashboard();
      if(selectedId){
        const a=alerts.find(x=>x.id===selectedId);
        if(a) renderDetail(a); else closeDetail();
      }
    },
    err=>{console.error(err);setSyncStatus('error','Error de conexión');}
  );
}

// ── HELPERS ──────────────────────────────────────────────────────────
function critColor(c){return c==='Crítica'?'#E24B4A':c==='Alta'?'#D85A30':c==='Media'?'#BA7517':'#639922';}
function critBadge(c){
  if(!c) return '<span class="badge" style="background:#eee;color:#999">—</span>';
  const cls=c==='Crítica'?'critica':c==='Alta'?'alta':c==='Media'?'media':'baja';
  return `<span class="badge badge-${cls}">${c}</span>`;
}
function estadoBadge(e){
  if(!e) return '';
  const cls=e==='Activa'?'activa':e==='En gestión'?'gestion':e==='Resuelta'?'resuelta':'descartada';
  return `<span class="badge badge-${cls}">${e}</span>`;
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function nombreVisible(a){return a.creadoNombre||a.creadoPor?.split('@')[0]||'—';}
function adjIcon(tipo){return tipo==='pdf'?'📄':tipo==='image'?'🖼️':'📎';}
function adjTipo(file){
  if(file.type==='application/pdf') return 'pdf';
  if(file.type.startsWith('image/')) return 'image';
  return 'file';
}

// ── FILTRADO ─────────────────────────────────────────────────────────
function getFiltered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const mobCrit=document.getElementById('mob-crit-filter')?.value||'';
  return alerts.filter(a=>{
    if(filters.estado    &&a.estado!==filters.estado) return false;
    if(filters.criticidad&&a.criticidad!==filters.criticidad) return false;
    if(mobCrit           &&a.criticidad!==mobCrit) return false;
    if(filters.tipo      &&a.tipo!==filters.tipo) return false;
    if(filters.situacion &&a.situacion!==filters.situacion) return false;
    if(filters.obra      &&a.obra!==filters.obra) return false;
    if(filters.usuario   &&a.creadoPor!==filters.usuario) return false;
    if(q&&!((a.descripcion||'').toLowerCase().includes(q)||(a.obra||'').toLowerCase().includes(q)||(a.tipo||'').toLowerCase().includes(q))) return false;
    if(fechaDesde||fechaHasta){
      const ts = a.creadoEn?.toDate?.()||null;
      if(!ts) return false;
      const d = new Date(ts.getFullYear(), ts.getMonth(), ts.getDate());
      if(fechaDesde && d < fechaDesde) return false;
      if(fechaHasta && d > fechaHasta) return false;
    }
    return true;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────
function render(){
  const filtered=getFiltered();
  const isMob=window.innerWidth<=768;
  const list=document.getElementById('alert-list');

  document.getElementById('cnt-all').textContent        =alerts.length;
  document.getElementById('cnt-activa').textContent     =alerts.filter(a=>a.estado==='Activa').length;
  document.getElementById('cnt-gestion').textContent    =alerts.filter(a=>a.estado==='En gestión').length;
  document.getElementById('cnt-resuelta').textContent   =alerts.filter(a=>a.estado==='Resuelta').length;
  document.getElementById('cnt-descartada').textContent =alerts.filter(a=>a.estado==='Descartada').length;
  document.getElementById('cnt-critica').textContent    =alerts.filter(a=>a.criticidad==='Crítica').length;
  document.getElementById('cnt-alta').textContent       =alerts.filter(a=>a.criticidad==='Alta').length;
  document.getElementById('cnt-media').textContent      =alerts.filter(a=>a.criticidad==='Media').length;
  document.getElementById('cnt-baja').textContent       =alerts.filter(a=>a.criticidad==='Baja').length;
  // Tarjetas resumen — solo alertas Activas
  const activas = alerts.filter(a=>a.estado==='Activa');
  document.getElementById('sum-n-critica').textContent = activas.filter(a=>a.criticidad==='Crítica').length;
  document.getElementById('sum-n-alta').textContent    = activas.filter(a=>a.criticidad==='Alta').length;
  document.getElementById('sum-n-media').textContent   = activas.filter(a=>a.criticidad==='Media').length;
  document.getElementById('sum-n-baja').textContent    = activas.filter(a=>a.criticidad==='Baja').length;
  // Resaltar tarjeta activa si hay filtro de criticidad
  ['critica','alta','media','baja'].forEach(k=>{
    const card = document.getElementById('sum-'+k);
    if(card) card.style.opacity = filters.criticidad && filters.criticidad.toLowerCase()!==k ? '0.45' : '1';
  });

  const tipos=[...new Set(alerts.map(a=>a.tipo).filter(Boolean))].sort();
  document.getElementById('tipo-filters').innerHTML=tipos.map(t=>
    `<div class="fopt ${filters.tipo===t?'active':''}" onclick="sbFilter('tipo','${esc(t)}',this)">
      <span>${esc(t)}</span><span class="fcnt">${alerts.filter(a=>a.tipo===t).length}</span></div>`
  ).join('')||'<div style="padding:4px 8px;font-size:11px;color:var(--text3)">Sin datos</div>';

  // Filtros situación — muestra solo las situaciones de la categoría filtrada
  const alertsParaSit = filters.tipo ? alerts.filter(a=>a.tipo===filters.tipo) : alerts;
  const situaciones=[...new Set(alertsParaSit.map(a=>a.situacion).filter(Boolean))].sort();
  // Indicadores de filtro activo en los botones del sidebar
  const fbMap = {
    'fb-cnt-estado':    filters.estado    ? filters.estado    : '',
    'fb-cnt-criticidad':filters.criticidad? filters.criticidad: '',
    'fb-cnt-tipo':      filters.tipo      ? filters.tipo.split(' - ')[0] : '',
    'fb-cnt-situacion': filters.situacion ? '●' : '',
    'fb-cnt-obra':      filters.obra      ? filters.obra      : '',
    'fb-cnt-usuario':   filters.usuario   ? filters.usuario.split('@')[0] : '',
  };
  Object.entries(fbMap).forEach(([id, val])=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = val;
    const btn = el.closest('.fblock-btn');
    if(btn) btn.classList.toggle('has-filter', !!val);
  });

  const sitEl = document.getElementById('situacion-filters');
  if(sitEl) sitEl.innerHTML=situaciones.map(s=>
    `<div class="fopt ${filters.situacion===s?'active':''}" onclick="sbFilter('situacion','${esc(s)}',this)">
      <span style="white-space:normal;line-height:1.3">${esc(s)}</span>
      <span class="fcnt" style="flex-shrink:0;margin-left:4px">${alerts.filter(a=>a.situacion===s).length}</span></div>`
  ).join('')||'<div style="padding:4px 8px;font-size:11px;color:var(--text3)">Sin datos</div>';

  const obras=[...new Set(alerts.map(a=>a.obra).filter(Boolean))].sort();
  document.getElementById('obra-filters').innerHTML=obras.map(o=>
    `<div class="fopt ${filters.obra===o?'active':''}" onclick="sbFilter('obra','${esc(o)}',this)">
      <span>${esc(o)}</span><span class="fcnt">${alerts.filter(a=>a.obra===o).length}</span></div>`
  ).join('')||'<div style="padding:4px 8px;font-size:11px;color:var(--text3)">Sin datos</div>';

  const usuarios=[...new Set(alerts.map(a=>a.creadoPor).filter(Boolean))];
  document.getElementById('user-filters').innerHTML=usuarios.map(u=>{
    const a=alerts.find(x=>x.creadoPor===u);
    return `<div class="fopt ${filters.usuario===u?'active':''}" onclick="sbFilter('usuario','${esc(u)}',this)">
      <span>${esc(nombreVisible(a||{creadoPor:u}))}</span>
      <span class="fcnt">${alerts.filter(x=>x.creadoPor===u).length}</span></div>`;
  }).join('')||'<div style="padding:4px 8px;font-size:11px;color:var(--text3)">Sin datos</div>';

  if(filtered.length===0){
    list.innerHTML=`<div class="empty-state"><div style="font-size:32px">🚧</div>
      <p>${alerts.length===0?'No hay alertas registradas. Crea la primera.':'Sin resultados para los filtros aplicados.'}</p></div>`;
    return;
  }

  if(isMob){
    list.innerHTML=filtered.map(a=>{
      const color=critColor(a.criticidad);
      const meta=[a.obra,a.tipo,nombreVisible(a)].filter(Boolean).join(' · ');
      const adjIcon_=a.adjuntos?.length?'📎 ':'';
      return `<div class="mob-row" onclick="openDetail('${a.id}')">
        <div class="mob-crit-bar" style="background:${color}"></div>
        <div class="mob-body">
          <div class="mob-title">${adjIcon_}${esc(a.descripcion||'')}</div>
          <div class="mob-meta">${esc(meta)} · ${fmtFecha(a.creadoEn)}</div>
          <div class="mob-badges">${critBadge(a.criticidad)} ${estadoBadge(a.estado)}</div>
        </div></div>`;
    }).join('');
  } else {
    // Ordenamiento
    const CRIT_ORD = {'Crítica':4,'Alta':3,'Media':2,'Baja':1,'':0};
    const EST_ORD  = {'Activa':1,'En gestión':2,'Resuelta':3,'Descartada':4};
    const sorted = [...filtered].sort((a,b)=>{
      let va, vb;
      if(sortCol==='descripcion'){ va=(a.descripcion||'').toLowerCase(); vb=(b.descripcion||'').toLowerCase(); }
      else if(sortCol==='nombre')  { va=nombreVisible(a).toLowerCase(); vb=nombreVisible(b).toLowerCase(); }
      else if(sortCol==='creadoEn'){ va=a.creadoEn?.toMillis?.()||0; vb=b.creadoEn?.toMillis?.()||0; }
      else if(sortCol==='obra')    { va=(a.obra||'').toLowerCase(); vb=(b.obra||'').toLowerCase(); }
      else if(sortCol==='criticidad'){ va=CRIT_ORD[a.criticidad]||0; vb=CRIT_ORD[b.criticidad]||0; }
      else if(sortCol==='tipo')    { va=(a.tipo||'').toLowerCase(); vb=(b.tipo||'').toLowerCase(); }
      else if(sortCol==='situacion'){ va=(a.situacion||'').toLowerCase(); vb=(b.situacion||'').toLowerCase(); }
      else if(sortCol==='estado')  { va=EST_ORD[a.estado]||0; vb=EST_ORD[b.estado]||0; }
      if(va<vb) return sortDir==='asc'?-1:1;
      if(va>vb) return sortDir==='asc'?1:-1;
      return 0;
    });

    function thSort(col, label){
      const active = sortCol===col;
      const arrow  = active ? (sortDir==='asc'?'↑':'↓') : '<span style="opacity:.25">↕</span>';
      return `<th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="setSort('${col}')">${label} ${arrow}</th>`;
    }

    const rows = sorted.map(a=>{
      const color=critColor(a.criticidad);
      const sel=selectedId===a.id;
      const tieneAdj=a.adjuntos&&a.adjuntos.length>0;
      return `<tr class="${sel?'sel':''}" onclick="openDetail('${a.id}')">
        <td style="width:22px;padding:0 0 0 14px;vertical-align:middle">
          <div style="width:4px;height:24px;border-radius:2px;background:${color}"></div>
        </td>
        <td class="td-desc">${esc(a.descripcion||'')}</td>
        <td class="td-txt">${esc(nombreVisible(a))}</td>
        <td class="td-mono">${fmtFecha(a.creadoEn)}</td>
        <td class="td-txt">${esc(a.obra||'—')}</td>
        <td>${critBadge(a.criticidad)}</td>
        <td class="td-cat">${esc(a.tipo||'—')}</td>
        <td class="td-cat">${esc(a.situacion||'—')}</td>
        <td style="padding-right:14px">${estadoBadge(a.estado)}</td>
      </tr>`;
    }).join('');

    list.innerHTML = `<table class="alert-table">
      <colgroup>
        <col style="width:22px">
        <col>
        <col style="width:110px">
        <col style="width:76px">
        <col style="width:68px">
        <col style="width:80px">
        <col style="width:110px">
        <col style="width:140px">
        <col style="width:76px">
      </colgroup>
      <thead><tr>
        <th style="width:22px;padding-left:14px"></th>
        ${thSort('descripcion','Descripción')}
        ${thSort('nombre','Creado por')}
        ${thSort('creadoEn','Fecha')}
        ${thSort('obra','Obra')}
        ${thSort('criticidad','Criticidad')}
        ${thSort('tipo','Categoría')}
        ${thSort('situacion','Situación')}
        ${thSort('estado','Estado')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }
}

  else{ renderDetail(a); document.getElementById('detail-panel').classList.add('open'); }

window.onFileSelected=function(event){
  const files=Array.from(event.target.files);
  files.forEach(file=>{
    if(file.size>20*1024*1024){showToast('⚠ Máximo 20MB por archivo');return;}
    const tipo=adjTipo(file);
    const previewUrl=tipo==='image'?URL.createObjectURL(file):null;
    pendingFiles.push({file,name:file.name,tipo,previewUrl,size:file.size});
  });
  event.target.value='';
  renderAdjuntosForm();
};

window.removePending=function(idx){
  pendingFiles.splice(idx,1);
  renderAdjuntosForm();
};

function renderAdjuntosForm(){
  const preview=document.getElementById('adj-preview');
  if(!preview) return;
  const allItems=[
    ...existingAdjuntos.map((a,i)=>({...a,existing:true,idx:i})),
    ...pendingFiles.map((f,i)=>({...f,existing:false,idx:i}))
  ];
  if(allItems.length===0){
    preview.innerHTML='<div class="adj-hint">📷 Foto desde cámara o 📎 archivo desde galería / explorador</div>';
    return;
  }
  preview.innerHTML=allItems.map(item=>{
    if(item.existing){
      return `<div class="adj-item">
        <span class="adj-item-icon">${adjIcon(item.tipo)}</span>
        <span class="adj-item-name">${esc(item.name)}</span>
        <span class="adj-item-size">guardado</span>
        <button class="adj-item-del" onclick="removeExisting(${item.idx})" title="Quitar">✕</button>
      </div>`;
    } else {
      return `<div class="adj-item">
        <span class="adj-item-icon">${adjIcon(item.tipo)}</span>
        <span class="adj-item-name">${esc(item.name)}</span>
        <span class="adj-item-size">${fmtSize(item.size)}</span>
        <button class="adj-item-del" onclick="removePending(${item.idx})" title="Quitar">✕</button>
      </div>`;
    }
  }).join('');
}

window.removeExisting=function(idx){
  existingAdjuntos.splice(idx,1);
  renderAdjuntosForm();
};

window.openModal=function(id){
  editId=id||null;
  pendingFiles=[];
  const a=id?alerts.find(x=>x.id===id):null;
  existingAdjuntos=a?.adjuntos?JSON.parse(JSON.stringify(a.adjuntos)):[];
  document.getElementById('modal-inner').innerHTML=buildForm(a);
  renderAdjuntosForm();
  // Poblar situaciones si hay categoría ya seleccionada (modo edición)
  if(a?.tipo) {
    updateSituaciones(null);
    const fSit = document.getElementById('f-situacion');
    if(fSit && a.situacion) {
      // Intentar seleccionar el valor guardado
      [...fSit.options].forEach(o => { if(o.value === a.situacion) o.selected = true; });
    }
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc')?.focus(),200);
};

window.closeModal=function(){
  document.getElementById('modal-bg').classList.remove('open');
  editId=null; pendingFiles=[]; existingAdjuntos=[];
};

window.saveAlert=async function(){
  const desc=document.getElementById('f-desc')?.value.trim();
  const obra       =document.getElementById('f-obra')?.value||'';
  const criticidad =document.getElementById('f-criticidad')?.value||'';
  const tipo       =document.getElementById('f-tipo')?.value||'';
  const situacion  =document.getElementById('f-situacion')?.value||'';
  const estado     =document.getElementById('f-estado')?.value||'Activa';

  // Validación campos obligatorios
  if(!desc){
    document.getElementById('f-desc')?.focus();
    showToast('⚠ La descripción es obligatoria'); return;
  }
  if(!obra){
    document.getElementById('f-obra')?.focus();
    showToast('⚠ Debes seleccionar una obra'); return;
  }
  if(!criticidad){
    document.getElementById('f-criticidad')?.focus();
    showToast('⚠ Debes seleccionar la criticidad'); return;
  }
  if(!tipo){
    document.getElementById('f-tipo')?.focus();
    showToast('⚠ Debes seleccionar una categoría'); return;
  }
  if(!situacion){
    document.getElementById('f-situacion')?.focus();
    showToast('⚠ Debes seleccionar una situación'); return;
  }

  const btn=document.getElementById('btn-guardar');
  if(btn){btn.disabled=true;btn.textContent=pendingFiles.length?'Subiendo...':'Guardando...';}

  try{
    if(IS_PREVIEW){
      if(editId){
        await window._previewUpdate(editId,{descripcion:desc,obra,criticidad,tipo,situacion,estado});
      } else {
        await window._previewSave({descripcion:desc,obra,criticidad,tipo,situacion,estado:'Activa',
          creadoPor:currentUser.email, creadoNombre:currentUser.displayName||currentUser.email.split('@')[0],
          creadoEn:{toDate:()=>new Date(),toMillis:()=>Date.now()}, adjuntos:[]});
      }
      showToast(editId?'✓ Alerta actualizada (preview)':'✓ Alerta registrada (preview)');
      closeModal(); return;
    }
    if(editId){
      await updateDoc(doc(db,COLECCION,editId),{descripcion:desc,obra,criticidad,tipo,situacion,estado});
      showToast('✓ Alerta actualizada');
    } else {
      await addDoc(collection(db,COLECCION),{
        descripcion:desc,obra,criticidad,tipo,situacion,estado:'Activa',
        creadoPor:currentUser.email,
        creadoNombre:currentUser.displayName||currentUser.email.split('@')[0],
        creadoEn:serverTimestamp(),
        adjuntos:[]
      });
      showToast('✓ Alerta registrada');
    }
    closeModal();
  }catch(e){
    showToast('⚠ Error al guardar');console.error(e);
    if(btn){btn.disabled=false;btn.textContent='Guardar alerta';}
  }
};

window.deleteAlert=async function(id){
  if(!confirm('¿Eliminar esta alerta? Esta acción no se puede deshacer.')) return;
  try{
    if(IS_PREVIEW){ await window._previewDelete(id); showToast('✓ Eliminada (preview)'); return; }
    await deleteDoc(doc(db,COLECCION,id));
    if(selectedId===id){selectedId=null;closeDetail();}
    showToast('✓ Alerta eliminada');
  }catch(e){showToast('⚠ Error al eliminar');console.error(e);}
};

window.sbFilter=function(k,v,el){
  filters[k]=filters[k]===v?'':v;
  if(el){
    el.closest('.fblock-body')?.querySelectorAll('.fopt').forEach(e=>e.classList.remove('active'));
    if(filters[k]===v) el.classList.add('active');
  } else {
    // Llamado desde tarjeta — sincronizar el fopt correspondiente en sidebar
    document.querySelectorAll(`[onclick*="sbFilter('${k}'"]`).forEach(e=>{
      if(e.tagName==='DIV') e.classList.remove('active');
    });
    if(filters[k]===v){
      document.querySelectorAll(`[onclick*="sbFilter('${k}','${v}'"]`).forEach(e=>{
        if(e.classList.contains('fopt')) e.classList.add('active');
      });
    }
  }
  render();
};

window.toggleFblock=function(id){
  const block = document.getElementById(id);
  if(!block) return;
  const body  = block.querySelector('.fblock-body, .date-filter-body');
  const arrow = block.querySelector('.fblock-arrow');
  if(!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if(arrow) arrow.classList.toggle('open', !isOpen);
};

window.onFechaChange=function(){
  const desde = document.getElementById('filter-fecha-desde')?.value;
  const hasta = document.getElementById('filter-fecha-hasta')?.value;
  fechaDesde = desde ? new Date(desde+'T00:00:00') : null;
  fechaHasta = hasta ? new Date(hasta+'T23:59:59') : null;
  // Indicador en botón
  const cnt = document.getElementById('fb-cnt-fecha');
  const btn = document.getElementById('fb-fecha')?.querySelector('.fblock-btn');
  const label = [desde?'Desde '+desde.slice(5):'', hasta?'Hasta '+hasta.slice(5):''].filter(Boolean).join(' ');
  if(cnt) cnt.textContent = label ? '●' : '';
  if(btn) btn.classList.toggle('has-filter', !!(fechaDesde||fechaHasta));
  render();
};

window.clearFecha=function(){
  fechaDesde=null; fechaHasta=null;
  const d=document.getElementById('filter-fecha-desde');
  const h=document.getElementById('filter-fecha-hasta');
  if(d) d.value=''; if(h) h.value='';
  const cnt=document.getElementById('fb-cnt-fecha');
  const btn=document.getElementById('fb-fecha')?.querySelector('.fblock-btn');
  if(cnt) cnt.textContent='';

window.clearFilters=function(){

// ── RENDER DASHBOARD ──────────────────────────────────────────────────
window.renderDashboard = function(){
  const obraF    = document.getElementById('db-obra')?.value||'';
  const tipoF    = document.getElementById('db-tipo')?.value||'';
  const critF    = document.getElementById('db-crit')?.value||'';
  const periodoF = parseInt(document.getElementById('db-periodo')?.value||'0');

  // Marcar selectores activos
  ['db-obra','db-tipo','db-crit','db-periodo'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('active', !!el.value);
  });

  // Filtrar datos
  const now = Date.now();
  let data = alerts.filter(a=>{
    if(obraF && a.obra!==obraF) return false;
    if(tipoF && a.tipo!==tipoF) return false;
    if(critF && a.criticidad!==critF) return false;
    if(periodoF){
      const ts = a.creadoEn?.toMillis?.()||0;
      if(now - ts > periodoF*24*60*60*1000) return false;
    }
    return true;
  });

  const activas   = data.filter(a=>a.estado==='Activa');
  const enGestion = data.filter(a=>a.estado==='En gestión');
  const resueltas = data.filter(a=>a.estado==='Resuelta');

  // Días promedio resolución
  const resTs = resueltas.filter(a=>a.creadoEn?.toMillis);
  const avgDias = resTs.length
    ? (resTs.reduce((s,a)=>s+(now-a.creadoEn.toMillis()),0)/resTs.length/86400000).toFixed(1)
    : '—';

  // Por obra
  const obras = [...new Set(alerts.map(a=>a.obra).filter(Boolean))].sort();
  const obraMax = Math.max(...obras.map(o=>data.filter(a=>a.obra===o).length),1);

  // Por categoría
  const cats = ['C1 - Personas','C2 - Ejecución','C3 - Abastecimiento','C4 - Proyecto',
    'C5 - Inmobiliaria','C6 - Seguridad','C7 - Entorno y comunidad','C8 - Gestión'];
  const catColors = {'C1 - Personas':'#7F77DD','C2 - Ejecución':'#5DCAA5',
    'C3 - Abastecimiento':'#BA7517','C4 - Proyecto':'#185FA5','C5 - Inmobiliaria':'#D4537E',
    'C6 - Seguridad':'#E24B4A','C7 - Entorno y comunidad':'#639922','C8 - Gestión':'#888780'};
  const catMax = Math.max(...cats.map(t=>data.filter(a=>a.tipo===t).length),1);

  // Por criticidad
  const critData = [
    {l:'Crítica', n:data.filter(a=>a.criticidad==='Crítica').length, c:'#A32D2D'},
    {l:'Alta',    n:data.filter(a=>a.criticidad==='Alta').length,    c:'#D85A30'},
    {l:'Media',   n:data.filter(a=>a.criticidad==='Media').length,   c:'#BA7517'},
    {l:'Baja',    n:data.filter(a=>a.criticidad==='Baja').length,    c:'#639922'},
  ];

  // Evolución mensual (últimos 6 meses)
  const meses = [];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    meses.push({y:d.getFullYear(),m:d.getMonth(),lbl:['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]});
  }
  const mesData = meses.map(m=>data.filter(a=>{
    const d=a.creadoEn?.toDate?.()||null;
    return d && d.getFullYear()===m.y && d.getMonth()===m.m;
  }).length);

  // Alertas sin gestionar (activas, ordenadas por antigüedad)
  const sinGestionar = [...activas]
    .filter(a=>a.creadoEn?.toMillis)
    .sort((a,b)=>a.creadoEn.toMillis()-b.creadoEn.toMillis())
    .slice(0,5);

  const critColor = c=>c==='Crítica'?'#E24B4A':c==='Alta'?'#D85A30':c==='Media'?'#BA7517':'#639922';
  const diasDesde = ts=>Math.floor((now-(ts?.toMillis?.()||now))/86400000);

  const labelFiltro = [
    obraF||'Todas las obras',
    tipoF ? tipoF.split(' - ')[0] : '',
    critF||'',
  ].filter(Boolean).join(' · ');

  document.getElementById('db-body').innerHTML = `
    <!-- KPIs -->
    <div class="db-row db-r4">
      <div class="db-card">
        <div class="db-kpi-lbl">Total alertas</div>
        <div class="db-kpi-num">${data.length}</div>
        <div class="db-kpi-sub">${labelFiltro}</div>
      </div>
      <div class="db-card">
        <div class="db-kpi-lbl">Activas</div>
        <div class="db-kpi-num" style="color:var(--crit-critica-fg)">${activas.length}</div>
        <div class="db-kpi-sub">${data.length?Math.round(activas.length/data.length*100):0}% del total</div>
      </div>
      <div class="db-card">
        <div class="db-kpi-lbl">En gestión</div>
        <div class="db-kpi-num" style="color:var(--crit-media-fg)">${enGestion.length}</div>
        <div class="db-kpi-sub">${data.length?Math.round(enGestion.length/data.length*100):0}% del total</div>
      </div>
      <div class="db-card">
        <div class="db-kpi-lbl">Días prom. resolución</div>
        <div class="db-kpi-num" style="color:var(--crit-baja-fg)">${avgDias}</div>
        <div class="db-kpi-sub">Alertas resueltas: ${resueltas.length}</div>
      </div>
    </div>

    <!-- Fila 2 -->
    <div class="db-row db-r3">
      <div class="db-card">
        <div class="db-card-title">Por categoría <span style="font-size:10px;color:var(--red);font-weight:400">↗ click para filtrar</span></div>
        ${cats.map(t=>{
          const n=data.filter(a=>a.tipo===t).length;
          const pct=Math.round(n/catMax*100);
          const lbl=t.replace(' - ',' · ');
          return `<div class="db-bar-row" onclick="dbFilterCat('${t}')">
            <div class="db-bar-lbl">${lbl}</div>
            <div class="db-bar-wrap"><div class="db-bar-fill" style="width:${pct}%;background:${catColors[t]}"></div></div>
            <div class="db-bar-num">${n}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="db-card">
        <div class="db-card-title">Por criticidad</div>
        <div style="position:relative;height:130px"><canvas id="db-crit-chart" role="img" aria-label="Distribución por criticidad">${critData.map(d=>d.l+' '+d.n).join(', ')}</canvas></div>
        <div class="db-leg">
          ${critData.map(d=>`<div class="db-leg-item"><span class="db-dot" style="background:${d.c}"></span>${d.l} ${d.n}</div>`).join('')}
        </div>
      </div>
      <div class="db-card">
        <div class="db-card-title">Por estado</div>
        ${[
          {n:'Activa',   v:activas.length,   c:'var(--crit-critica-fg)'},
          {n:'En gestión',v:enGestion.length, c:'var(--blue)'},
          {n:'Resuelta',  v:resueltas.length, c:'var(--crit-baja-fg)'},
          {n:'Descartada',v:data.filter(a=>a.estado==='Descartada').length,c:'var(--text3)'},
        ].map(s=>`<div class="db-st-row">
          <div class="db-st-name"><span class="db-dot" style="background:${s.c}"></span>${s.n}</div>
          <div class="db-st-bar"><div class="db-st-fill" style="width:${data.length?Math.round(s.v/data.length*100):0}%;background:${s.c}"></div></div>
          <div class="db-st-num">${s.v}</div>
        </div>`).join('')}
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
          <div class="db-card-title" style="margin-bottom:6px">Activas por obra</div>
          <div>${obras.map(o=>{
            const n=activas.filter(a=>a.obra===o).length;
            return n>0?`<span class="db-chip" onclick="dbFilterObra('${o}')">${o} <strong>${n}</strong></span>`:'';
          }).join('')}</div>
        </div>
      </div>
    </div>

    <!-- Fila 3 -->
    <div class="db-row db-r2">
      <div class="db-card">
        <div class="db-card-title">Evolución mensual — alertas ingresadas</div>
        <div style="position:relative;height:160px"><canvas id="db-mes-chart" role="img" aria-label="Evolución mensual">${meses.map((m,i)=>m.lbl+' '+mesData[i]).join(', ')}</canvas></div>
      </div>
      <div class="db-card">
        <div class="db-card-title">Alertas activas sin gestionar <span style="font-size:10px;color:var(--text3);font-weight:400">(más antiguas)</span></div>
        ${sinGestionar.length===0
          ? '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Sin alertas activas</div>'
          : sinGestionar.map(a=>`<div class="db-alerta-row">
              <div class="db-alerta-bar" style="background:${critColor(a.criticidad)}"></div>
              <div>
                <div class="db-alerta-desc">${esc(a.descripcion||'')}</div>
                <div class="db-alerta-meta">${esc(a.obra||'—')} · ${esc(a.tipo?.split(' - ')[0]||'—')} · ${diasDesde(a.creadoEn)} días</div>
              </div>
            </div>`).join('')
        }
      </div>
    </div>
  `;

  // Dibujar gráficos
  setTimeout(()=>{
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const textC = isDark?'rgba(255,255,255,.45)':'rgba(0,0,0,.35)';
    const gridC = isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';

    const cCrit = document.getElementById('db-crit-chart');
    if(cCrit){
      if(cCrit._chart) cCrit._chart.destroy();
      cCrit._chart = new Chart(cCrit,{
        type:'doughnut',
        data:{labels:critData.map(d=>d.l),datasets:[{data:critData.map(d=>d.n),backgroundColor:critData.map(d=>d.c),borderWidth:0,hoverOffset:4}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.parsed}}}}
      });
    }
    const cMes = document.getElementById('db-mes-chart');
    if(cMes){
      if(cMes._chart) cMes._chart.destroy();
      cMes._chart = new Chart(cMes,{
        type:'bar',
        data:{labels:meses.map(m=>m.lbl),datasets:[{label:'Alertas',data:mesData,backgroundColor:'#CC2929',borderRadius:4,borderSkipped:false,minBarLength:3}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
          x:{ticks:{color:textC,font:{size:11},autoSkip:false,maxRotation:0},grid:{display:false},border:{display:false}},
          y:{ticks:{color:textC,font:{size:11},stepSize:1,precision:0},grid:{color:gridC},border:{display:false},min:0,grace:'10%'}
        }}
      });
    }
  },50);
};

window.dbFilterCat = function(cat){
  const sel = document.getElementById('db-tipo');
  if(!sel) return;
  sel.value = sel.value===cat?'':cat;
  sel.classList.toggle('active',!!sel.value);
  renderDashboard();
};
window.dbFilterObra = function(obra){
  const sel = document.getElementById('db-obra');
  if(!sel) return;
  sel.value = sel.value===obra?'':obra;
  sel.classList.toggle('active',!!sel.value);
  renderDashboard();
};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</body>
</html>
